# Bloco a ser incluído na config do Nginx do host EC2
# (em /etc/nginx/sites-available/roianalyser ou similar).
#
# Convive com a versão vanilla atual: o React fica servindo em /v2/, e o
# vanilla continua na raiz. A API permanece em /api/* atendida pelo container
# roi-analyzer-api (127.0.0.1:3030).

# ------------------------------------------------------------------
# RoiAnalyser — versão React (paralela à vanilla)
# Servida em /v2/ a partir de /var/www/roianalyser-web/dist/
# ------------------------------------------------------------------
location /v2/ {
    alias /var/www/roianalyser-web/dist/;
    index index.html;

    # SPA fallback — qualquer rota dentro de /v2/ que não for arquivo
    # físico cai em index.html para o React Router resolver.
    try_files $uri $uri/ /v2/index.html;

    # Cache moderado de assets (Vite gera nomes com hash → seguros).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # index.html não deve cachear — para garantir que cada deploy é visto.
    location = /v2/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

# ------------------------------------------------------------------
# Endpoint /v2 sem barra → redirect para /v2/ (caso usuário digite "errado").
# ------------------------------------------------------------------
location = /v2 {
    return 301 /v2/;
}

# ------------------------------------------------------------------
# A API (/api/*) já é servida pelo bloco existente do Nginx — fazendo proxy
# para 127.0.0.1:3030 (container roi-analyzer-api). NÃO duplicar aqui.
# ------------------------------------------------------------------
